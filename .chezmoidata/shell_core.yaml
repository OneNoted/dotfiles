env:
  - name: EDITOR
    value: nvim
  - name: VISUAL
    value: nvim
  - name: SUDO_EDITOR
    value: nvim

aliases:
  core:
    - name: cd
      value: z
    - name: find
      value: fd
    - name: vim
      value: nvim
    - name: vi
      value: nvim
    - name: yay
      value: paru
    - name: clear
      value: "printf '\\033[2J\\033[3J\\033[1;1H'"
    - name: pamcan
      value: pacman
    - name: tree
      value: eza --tree --all --icons --group-directories-first
    - name: cat
      value: bat --paging=never --style=plain
    - name: gitpkg
      value: "pacman -Q | grep -i \"\\-git\" | wc -l"
    - name: swww
      value: awww
    - name: swww-daemon
      value: awww-daemon
    - name: jctl
      value: journalctl -p 3 -xb
    - name: rip
      value: "expac --timefmt='%Y-%m-%d %T' '%l\\t%n %v' | sort | tail -200 | nl"

  fish:
    - name: ls
      value: eza -al --color=always --group-directories-first --icons
    - name: la
      value: eza -a --color=always --group-directories-first --icons
    - name: ll
      value: eza -l --color=always --group-directories-first --icons
    - name: lt
      value: eza -aT --color=always --group-directories-first --icons
    - name: l.
      value: "eza -a | grep -e '^\\.'"

  zsh:
    - name: ls
      value: eza -al --color=always --group-directories-first --icons
    - name: la
      value: eza -a --color=always --group-directories-first --icons
    - name: ll
      value: eza -l --color=always --group-directories-first --icons
    - name: lt
      value: eza -aT --color=always --group-directories-first --icons
    - name: l.
      value: "eza -a | grep -e '^\\.'"
