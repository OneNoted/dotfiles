nvim_profiles:
  default: nvim-lazy
  profiles:
    - name: nvim
      source: .profiles/nvim/nvim
    - name: nvim-lazy
      source: dot_config/nvim
    - name: nvim-nightly
      source: .profiles/nvim/nvim-nightly
      pack_lockfile: dot_config/nvim/nvim-pack-lock.json
    - name: nvim-server
      source: .profiles/nvim/nvim-server
      pack_lockfile: dot_config/nvim/nvim-pack-lock.json
