# Arch package manifest for this dotfiles repo.
# Base install uses only [arch] packages.
# Optional groups can be included with: bootstrap/bootstrap.sh --group <name> --install
# Component installs use [components.<name>] via bootstrap/bootstrap.sh --component <name> --install

[arch]
pacman = [
  "chezmoi",
  "jujutsu",
  "fish",
  "zsh",
  "nushell",
  "neovim",
  "kitty",
  "tmux",
  "zellij",
  "starship",
  "eza",
  "fd",
  "ripgrep",
  "fzf",
  "zoxide",
  "atuin",
  "yazi",
  "jq",
  "wl-clipboard",
  "ffmpeg",
  "playerctl",
  "brightnessctl",
  "pre-commit",
  "shellcheck",
  "shfmt",
  "stylua",
  "taplo-cli",
]
aur = [
  "carapace-bin",
]

[groups.wm]
pacman = [
  "hyprland",
  "hyprpaper",
  "hyprlock",
  "swww",
  "slurp",
  "wf-recorder",
  "hyprshot",
]
aur = []

[groups.desktop]
pacman = [
  "niri",
  "btop",
  "fastfetch",
]
aur = [
  "hyprpanel-git",
  "zen-browser-bin",
]

[groups.nvim]
pacman = [
  "lua-language-server",
  "yaml-language-server",
  "gopls",
  "rust-analyzer",
  "taplo-cli",
]
aur = [
  "qmlls6",
]

[components.nvim]
pacman = [
  "chezmoi",
  "git",
  "neovim",
  "fd",
  "ripgrep",
  "wl-clipboard",
  "stylua",
  "taplo-cli",
  "onefetch",
  "nodejs",
  "prettier",
  "lua-language-server",
  "yaml-language-server",
  "typescript-language-server",
  "vscode-json-languageserver",
  "gopls",
  "go",
  "go-tools",
  "golangci-lint",
  "rust",
  "rust-analyzer",
  "zig",
  "zls",
]
aur = [
  "qmlls6",
]
