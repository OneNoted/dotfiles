# audio-eq-id = thieaudio-hype-4-mkii-comfort-treble
# audio-eq-name = Comfort treble trim
# audio-eq-headphone = THIEAUDIO Hype 4 MKII
# audio-eq-target = Flat subjective tone shaping: slight bass lift with raw unequed treble
# audio-eq-eq-sink = effect_input.sundara_silver_eq
# audio-eq-output-sink = alsa_output.usb-R__DE_RODECaster_Pro_II_GV0067720-00.pro-output-1
# audio-eq-service = filter-chain.service
# Subjective profile from flat. Does not include the CrinEar/reference correction preset.

context.modules = [
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "THIEAUDIO Hype 4 MKII Comfort EQ"
            media.name       = "THIEAUDIO Hype 4 MKII Comfort EQ"
            filter.graph = {
                nodes = [
                    {
                        type  = builtin
                        name  = preamp
                        label = bq_highshelf
                        control = { "Freq" = 0.0 "Q" = 0.70 "Gain" = -2.3 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_1
                        label = bq_peaking
                        control = { "Freq" = 20.0 "Q" = 0.60 "Gain" = 0.5 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_2
                        label = bq_peaking
                        control = { "Freq" = 140.0 "Q" = 1.20 "Gain" = 2.5 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_3
                        label = bq_peaking
                        control = { "Freq" = 900.0 "Q" = 0.90 "Gain" = 1.2 }
                    }
                ]
                links = [
                    { output = "preamp:Out" input = "eq_band_1:In" }
                    { output = "eq_band_1:Out" input = "eq_band_2:In" }
                    { output = "eq_band_2:Out" input = "eq_band_3:In" }
                ]
            }
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name   = "effect_input.sundara_silver_eq"
                media.class = Audio/Sink
            }
            playback.props = {
                node.name     = "effect_output.sundara_silver_eq"
                node.passive  = true
                target.object = "alsa_output.usb-R__DE_RODECaster_Pro_II_GV0067720-00.pro-output-1"
            }
        }
    }
]
