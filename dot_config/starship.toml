$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$crystal\
$shell\
$status\
$os\
$battery\
$time"""


[os]
disabled = true
style = "fg:mauve"

[os.symbols]
RedHatEnterprise = "уұ„ӣ"
Windows = "оңҸ"
Ubuntu = "у°•Ҳ"
SUSE = "пҢ”"
Raspbian = "у°җҝ"
Mint = "у°Јӯ"
Macos = "у°Җө"
Manjaro = "пҢ’"
Linux = "у°ҢҪ"
Gentoo = "у°ЈЁ"
Fedora = "у°Јӣ"
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "оңҺ"
Arch = " у°ЈҮ"
Artix = "у°ЈҮ"
EndeavourOS = " у°ЈҮ"
CentOS = "пҢ„"
Debian = "у°Јҡ"
Redhat = "уұ„ӣ"

[localip]
ssh_only = true
format = " в—Ҝ [$localipv4](bold magenta) "
disabled = false

[hostname]
style = "mauve"
ssh_symbol = "у°Ңҳ "
format = '[$ssh_symbol$hostname]($style)'

[username]
style_user = "bright-yellow bold "
style_root = "purple bold "
format = "[вӯҳ $user]($style) "
disabled = false
show_always = false
# aliases = { "notes" = "Notes" }

[directory]
truncation_symbol = "вҖўвҖў/"
home_symbol = "вҢӮ"
truncation_length = 4
read_only = " в—Ҳ"
use_os_path_sep = true
repo_root_style = 'bold blue'
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) [в–і](bold bright-blue)'
style = "italic mauve"
format = '[$path]($style)[$read_only]($read_only_style)'

[directory.substitutions]
"Desktop" = " п’© "
"Pictures" = "пҖҫ "
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "у°қҡ "
"Developer" = "у°ІӢ "

[git_commit]
style = "bold italic bright-blue"
commit_hash_length = 7
only_detached = true
tag_disabled = true
disabled = false
format = '[ вҺӘ(bold italic bright-blue) пҗ— $commit $hash ](fg:blue )'

[git_branch]
format = " [$branch(:$remote_branch)]($style)"
symbol = "[пҗҳ](bold italic bright-blue)"
style = "italic bright-blue"
truncation_symbol = "вӢҜ"
truncation_length = 11
ignore_branches = ["main", "master"]
only_attached = true

[git_metrics]
format = '([в–ҙ$added]($added_style))([в–ҝ$deleted]($deleted_style))'
added_style = 'italic dimmed green'
deleted_style = 'italic dimmed red'
ignore_submodules = true
disabled = false

[git_status]
style = "bold italic bright-blue"
format = "([вҺӘ$ahead_behind$staged$modified$untracked$renamed$deleted$conflicted$stashedвҺҘ]($style))"
conflicted = "[в—Әв—Ұ](italic bright-magenta)"
ahead = "[в–ҙв”Ӯ[${count}](bold white)в”Ӯ](italic green)"
behind = "[в–ҝв”Ӯ[${count}](bold white)в”Ӯ](italic red)"
diverged = "[в—Ү в–ҙв”Ө[${ahead_count}](regular white)в”Ӯв–ҝв”Ө[${behind_count}](regular white)в”Ӯ](italic bright-magenta)"
untracked = "[в—Ңв—Ұ](italic bright-yellow)"
stashed = "[в—ғв—Ҳ](italic white)"
modified = "[в—Ҹв—Ұ](italic yellow)"
staged = "[в–Әв”Ө[$count](bold white)в”Ӯ](italic bright-cyan)"
renamed = "[в—Һв—Ұ](italic bright-blue)"
deleted = "[вң•](italic red)"

[deno]
format = " [deno](italic) [вҲ« $version](green bold)"
version_format = "${raw}"

[lua]
format = " [lua](italic) [${symbol}${version}]($style)"
version_format = "${raw}"
symbol = "вЁҖ "
style = "bold bright-yellow"

[nodejs]
format = " [node](italic) [в—« ($version)](bold bright-green)"
version_format = "${raw}"
detect_files = ["package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]
detect_extensions = []

[python]
format = " [py](italic) [${symbol}${version}]($style)"
symbol = "[вҢү](bold bright-blue)вҢҠ "
version_format = "${raw}"
style = "bold bright-yellow"

[ruby]
format = " [rb](italic) [${symbol}${version}]($style)"
symbol = "в—Ҷ "
version_format = "${raw}"
style = "bold red"

[rust]
format = " [rs](italic) [$symbol$version]($style)"
symbol = "вҠғ "
version_format = "${raw}"
style = "bold red"

[package]
format = " [pkg](italic dimmed) [$symbol$version]($style)"
version_format = "${raw}"
symbol = "в—Ё "
style = "dimmed yellow italic bold"

[swift]
format = " [sw](italic) [${symbol}${version}]($style)"
symbol = "в—Ғ "
style = "bold bright-red"
version_format = "${raw}"

[aws]
disabled = true
format = " [aws](italic) [$symbol $profile $region]($style)"
style = "bold blue"
symbol = "в–І "

[buf]
symbol = "в–  "
format = " [buf](italic) [$symbol $version $buf_version]($style)"

[c]
symbol = "в„Ӯ "
format = " [$symbol($version(-$name))]($style)"

[cpp]
symbol = "в„Ӯ "
format = " [$symbol($version(-$name))]($style)"

[conda]
symbol = "в—Ҝ "
format = " conda [$symbol$environment]($style)"

[pixi]
symbol = "в–  "
format = " pixi [$symbol$version ($environment )]($style)"

[dart]
symbol = "в—Ғв—… "
format = " dart [$symbol($version )]($style)"

[docker_context]
symbol = "в—§ "
format = " docker [$symbol$context]($style)"

[elixir]
symbol = "в–і "
format = " exs [$symbol $version OTP $otp_version ]($style)"

[elm]
symbol = "в—© "
format = " elm [$symbol($version )]($style)"

[golang]
symbol = "вҲ© "
format = " go [$symbol($version )]($style)"

[haskell]
symbol = "вқҜО» "
format = " hs [$symbol($version )]($style)"

[java]
symbol = "вҲӘ "
format = " java [${symbol}(${version} )]($style)"

[julia]
symbol = "в—Һ "
format = " jl [$symbol($version )]($style)"

[memory_usage]
symbol = "в–Әв–«в–Ә "
format = " mem [${ram}( ${swap})]($style)"

[nim]
symbol = "в–ҙв–Ів–ҙ "
format = " nim [$symbol($version )]($style)"

[nix_shell]
style = 'bold italic dimmed blue'
symbol = 'вң¶'
format = '[$symbol nixвҺӘ$stateвҺӘ]($style) [$name](italic dimmed white)'
impure_msg = '[вҢҪ](bold dimmed red)'
pure_msg = '[вҢҫ](bold dimmed green)'
unknown_msg = '[в—Ң](bold dimmed yellow)'

[spack]
symbol = "в—Ү "
format = " spack [$symbol$environment]($style)"

[time]
disabled = false
format = "[ $time]($style)"
time_format = "%R"
utc_time_offset = "local"
style = "italic dimmed mauve"


[line_break]
disabled = true

[battery]
format = "[ $percentage $symbol]($style)"
full_symbol = "в–Ҳ"
charging_symbol = "[вҶ‘](italic bold green)"
discharging_symbol = "вҶ“"
unknown_symbol = "в–‘"
empty_symbol = "в–ғ"

[[battery.display]]
threshold = 20
style = "italic bold red"

[[battery.display]]
threshold = 60
style = "italic dimmed bright-purple"

[[battery.display]]
threshold = 70
style = "italic dimmed yellow"


[fill]
symbol = ' '

[sudo]
format = "[$symbol]($style)"
style = "bold mauve"
# symbol = "[оғ—](bold fg:mauve)[](bold fg:mauve bg:mauve)"
symbol = "[вӢҲв”Ҳ](bold fg:mauve)[](bold fg:mauve bg:mauve)"

disabled = false

[character]
success_symbol = '[в—Һ](bold fg:mauve)'
error_symbol = '[в—Ӣ](bold fg:red)'
vimcmd_symbol = '[в– ](italic  fg:blue)'
vimcmd_replace_one_symbol = "в—Ң"
vimcmd_replace_symbol = "в–Ў"
vimcmd_visual_symbol = "в–ј"


[cmd_duration]
format = "[в—„ $duration ](italic white)"

# min_time = 1000
# show_milliseconds = true
# format = "[ пӮ…  $duration ]($style)"
# style = "bg:mantle fg:peach"
# disabled = false
# show_notifications = true


