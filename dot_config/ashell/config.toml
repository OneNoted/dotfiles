log_level = "warn"
outputs = "All"
position = "Top"
app_launcher_cmd = "vicinae toggle"

[modules]
left = [ [ "appLauncher", "Updates", "Workspaces" ] ]
center = [ "WindowTitle" ]
right = [ "SystemInfo", [ "Tray", "Notifications", "Tempo", "Privacy", "Settings" ] ]

[notifications]
max_notifications = 50
default_timeout = 5000

[updates]
check_cmd = "checkupdates; paru -Qua"
update_cmd = 'kitty -e bash -c "paru; echo Done - Press enter to exit; read" &'

[[CustomModule]]
name = "appLauncher"
icon = "󱗼"
command = "vicinae toggle"

[workspaces]
visibility_mode = "MonitorSpecific"
enable_workspace_filling = false

[window_title]
truncate_title_after_length = 100

[settings]
lock_cmd = "playerctl --all-players pause; hyprlock &"
logout_cmd = "niri msg action quit"
shutdown_cmd = "shutdown now"
reboot_cmd = "systemctl reboot"
suspend_cmd = "systemctl suspend"
audio_sinks_more_cmd = "pavucontrol -t 3"
audio_sources_more_cmd = "pavucontrol -t 4"
indicators = ["IdleInhibitor", "Audio", "Bluetooth", "Network", "Vpn"]

[tempo]
clock_format = "%a %d %b %R"

[system_info]
indicators = ["Cpu", "Memory", "Temperature"]

[system_info.cpu]
warn = 60
alert = 80

[system_info.memory]
warn = 70
alert = 85

[system_info.temperature]
warn = 60
alert = 80

[appearance]
font_name = "JetBrainsMono Nerd Font"
scale_factor = 1.15
style = "Islands"
primary_color = "#7aa2f7"
success_color = "#9ece6a"
text_color = "#a9b1d6"
workspace_colors = [ "#7aa2f7", "#9ece6a" ]
special_workspace_colors = [ "#7aa2f7", "#9ece6a" ]

[appearance.menu]
opacity = 0.75
backdrop = 0.3

[appearance.danger_color]
base = "#f7768e"
weak = "#e0af68"

[appearance.background_color]
base = "#1a1b26"
weak = "#24273a"
strong = "#414868"

[appearance.secondary_color]
base = "#0c0d14"
