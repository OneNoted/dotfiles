[mgr]
ratio = [1, 4, 3]
sort_by = "alphabetical"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
sort_translit = false
sort_fallback = "alphabetical"
linemode = "size_and_mtime"
show_hidden = false
show_symlink = true
scrolloff = 5
mouse_events = ["click", "scroll"]

[preview]
wrap = "no"
tab_size = 2
max_width = 600
max_height = 900
cache_dir = ""
image_delay = 30
image_filter = "triangle"
image_quality = 75
ueberzug_scale = 1
ueberzug_offset = [0, 0, 0, 0]


[opener]
play = [{ run = 'mpv %s', orphan = true, for = "unix" }]
edit = [{ run = 'nvim %S', block = true, for = "unix" }]
open = [{ run = 'xdg-open %s1', desc = "Open", for = "linux" }]

[open]
prepend_rules = [
  { mime = "vfs/{absent,stale}", use = "download" },
  { url = "*.json", use = "edit" },
  { url = "*.sh", use = "edit" },
  { url = "*.toml", use = "edit" },
  { url = "*.y*ml", use = "edit" },
  { url = "*config", use = "edit" },
  { url = "*.cfg", use = "edit" },
  { url = "*env", use = "edit" },
  { url = "*.d", use = "edit" },
  { url = "*.md", use = "edit" },
  { url = "*.txt", use = "edit" },
  { url = ".zsh*", use = "edit" },
  { url = "*.ini", use = "edit" },
  { url = "*.lua", use = "edit" },
  { url = "*.xml", use = "edit" },
  { url = "*.log", use = "edit" },
  # open with normal / gnome / kde
  { url = "*.ods", use = "open" },
  { url = "*.pdf", use = "open" },
  # open with multimedia player
  { url = "*.mp3", use = "play" },

]
append_rules = [{ url = "*", use = "edit" }]
