# Keep WebRTC/voice clients from rewriting the global input-device volume.
pulse.rules = [
  {
    matches = [
      {
        application.process.binary = "~^(brave|brave-browser|chrome|chromium|discord|Discord|electron|electron[0-9]*|equibop|firefox|google-chrome|google-chrome-stable|slack|teams|teams-for-linux|vesktop|vivaldi|vivaldi-bin|zoom|zoom-us)$"
      }
      {
        application.name = "~^(Brave|Chromium|Chromium input|Discord|Equibop|Firefox|Google Chrome|Google Chrome input|Microsoft Teams|Slack|Vesktop|Vivaldi|Zoom).*$"
      }
    ]
    actions = {
      quirks = [ block-source-volume ]
    }
  }
]
