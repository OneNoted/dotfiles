# RODECaster Pro II USB 1 Expanded exposes Chat, Game, Music, A, and B as
# stereo pairs on the 10-channel pro-output-1 sink.
pulse.cmd = [
    {
        cmd = "load-module"
        args = "module-remap-sink sink_name=rodecaster_game sink_properties=device.description=RODECaster-Game master=alsa_output.usb-R__DE_RODECaster_Pro_II_GV0067720-00.pro-output-1 channels=2 master_channel_map=aux2,aux3 channel_map=front-left,front-right remix=no"
        flags = [ "nofail" ]
    }
    {
        cmd = "load-module"
        args = "module-remap-sink sink_name=rodecaster_music sink_properties=device.description=RODECaster-Music master=alsa_output.usb-R__DE_RODECaster_Pro_II_GV0067720-00.pro-output-1 channels=2 master_channel_map=aux4,aux5 channel_map=front-left,front-right remix=no"
        flags = [ "nofail" ]
    }
]
